<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Environmental Engineering</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">🌱 EnvEng Portal</a>
            <ul class="navbar-menu">
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-header">
            <h1>Admin Dashboard</h1>
            <div class="user-info" id="user-info">
                <span id="user-name"></span>
                <span class="user-role" id="user-role"></span>
            </div>
        </div>

        <div class="card">
            <h3>📢 Post New Notice</h3>
            <form id="add-notice-form">
                <div class="form-group">
                    <label for="notice-title">Title</label>
                    <input type="text" id="notice-title" required>
                </div>
                <div class="form-group">
                    <label for="notice-content">Content</label>
                    <textarea id="notice-content" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="notice-target">Target Audience (Optional)</label>
                    <select id="notice-target">
                        <option value="">Everyone</option>
                        <option value="student">Students Only</option>
                        <option value="staff">Staff Only</option>
                        <option value="admin">Admins Only</option>
                    </select>
                </div>
                <button type="submit" class="btn">Post Notice</button>
            </form>
        </div>

        <div class="card" style="margin-top: 1rem;">
            <h3>📋 Manage Users</h3>
            <div class="table-container">
                <table id="users-table">
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Action</th></tr>
                    </thead>
                    <tbody id="users-list"></tbody>
                </table>
            </div>
        </div>

        <div class="card" style="margin-top: 1rem;">
            <h3>📢 All Notices</h3>
            <div id="all-notices"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Environmental Engineering Department. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        async function loadDashboard() {
            try {
                const user = await checkAuth();
                if (!user || user.role !== 'admin') {
                    window.location.href = 'login.html';
                    return;
                }
                
                document.getElementById('user-name').textContent = `Welcome, ${user.name}`;
                document.getElementById('user-role').textContent = user.role;
                
                await loadUsers();
                await loadAllNotices();
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                
                const usersList = document.getElementById('users-list');
                usersList.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.id}</td>
                        <td>${escapeHtml(user.name)}</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td>${user.role}</td>
                        <td>${new Date(user.created_at).toLocaleDateString()}</td>
                        <td><button onclick="deleteUser(${user.id})" class="btn-secondary" style="padding: 0.25rem 0.5rem;">Delete</button></td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }
        
        async function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    const response = await fetch(`/api/users/${userId}`, { method: 'DELETE' });
                    if (response.ok) {
                        showAlert('User deleted successfully', 'success');
                        await loadUsers();
                    } else {
                        showAlert('Failed to delete user', 'error');
                    }
                } catch (error) {
                    showAlert('Error deleting user', 'error');
                }
            }
        }
        
        async function loadAllNotices() {
            try {
                const response = await fetch('/api/notices');
                const notices = await response.json();
                
                const container = document.getElementById('all-notices');
                if (notices.length === 0) {
                    container.innerHTML = '<p>No notices available.</p>';
                    return;
                }
                
                container.innerHTML = notices.map(notice => `
                    <div class="notice-card">
                        <div class="notice-title">${escapeHtml(notice.title)}</div>
                        <div class="notice-content">${escapeHtml(notice.content)}</div>
                        <div class="notice-date">Posted by ${notice.author || 'Admin'} on ${new Date(notice.created_at).toLocaleString()}</div>
                        <button onclick="deleteNotice(${notice.id})" class="btn-secondary" style="margin-top: 0.5rem; padding: 0.25rem 0.5rem;">Delete</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading notices:', error);
            }
        }
        
        async function deleteNotice(noticeId) {
            if (confirm('Are you sure you want to delete this notice?')) {
                try {
                    const response = await fetch(`/api/notices/${noticeId}`, { method: 'DELETE' });
                    if (response.ok) {
                        showAlert('Notice deleted successfully', 'success');
                        await loadAllNotices();
                    } else {
                        showAlert('Failed to delete notice', 'error');
                    }
                } catch (error) {
                    showAlert('Error deleting notice', 'error');
                }
            }
        }
        
        document.getElementById('add-notice-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('notice-title').value;
            const content = document.getElementById('notice-content').value;
            const target_role = document.getElementById('notice-target').value || null;
            
            try {
                const response = await fetch('/api/notices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content, target_role })
                });
                
                if (response.ok) {
                    showAlert('Notice posted successfully!', 'success');
                    document.getElementById('add-notice-form').reset();
                    await loadAllNotices();
                } else {
                    showAlert('Failed to post notice', 'error');
                }
            } catch (error) {
                showAlert('Error posting notice', 'error');
            }
        });
        
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
